name: Release

on:
  push:
    branches:
      - main

concurrency: release-${{ github.ref }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm publint
      - run: pnpm pack:dry-run
      - run: pnpm build:examples
      - name: Check npm publishing configuration
        id: npm-publishing
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TRUSTED_PUBLISHING: ${{ vars.NPM_TRUSTED_PUBLISHING }}
        run: |
          if [ -n "${NPM_TOKEN}" ] || [ "${NPM_TRUSTED_PUBLISHING}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping npm publish. Configure NPM_TOKEN or set the NPM_TRUSTED_PUBLISHING repository variable to true after npm trusted publishing is enabled."
          fi
      - name: Check npm package bootstrap state
        if: steps.npm-publishing.outputs.enabled == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TRUSTED_PUBLISHING: ${{ vars.NPM_TRUSTED_PUBLISHING }}
        run: pnpm release:preflight
      - uses: changesets/action@v1
        if: steps.npm-publishing.outputs.enabled == 'true'
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
